services:
  # Database services (postgreSQL)
  db:
    image: postgres:18
    container_name: scheduler_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5436}:5432"
    volumes:
      - scheduler-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      db:
        condition: service_healthy

  # Backend FastAPI python
  main-api:
    build:
      context: ./app/
      dockerfile: Dockerfile
    container_name: scheduler-main-api
    restart: always
      #must waiting database to healthcheck
    depends_on: 
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: ${MAIN_API_PORT:-3001}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${MAIN_API_PORT:-8000}:8000"
    volumes:
      - ./app:/app
    working_dir: /app
    command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]

  # Prometheus and cAdvisor for monitoring
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
  
  prometheus:
    image: prom/prometheus:v2.45.0
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus_config:/etc/prometheus
      - prometheus-data:/prometheus

volumes:
  scheduler-data: 
  prometheus-data:

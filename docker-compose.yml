version: '3.9'

services:
  # Database services (postgreSQL)
  db:
    image: postgres:18
    container_name: scheduler_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5436}:5432"
    volumes:
      - scheduler-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI python
  main-api:
    build:
      context: ./app/
      dockerfile: Dockerfile
    container_name: scheduler-main-api
    restart: always
      #must waiting database to healthcheck
    depends_on: 
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: ${MAIN_API_PORT:-3001}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${MAIN_API_PORT:-8000}:8000"
    volumes:
      - ./app:/app
    working_dir: /app
    command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]

  # Frontend (Not yet)

volumes:
  scheduler-data: 
